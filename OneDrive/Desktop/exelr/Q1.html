<!DOCTYPE html>
<html lang="en">
<head>
  <title>Flipkart Login Page</title>
  <link rel="stylesheet" href="CSS_q1.css">
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <h1>Login</h1>
      <p>Get access to your Orders, Wishlist and Recommendations</p>
      <img src="https://images.yourstory.com/cs/wordpress/2017/07/Flipkart.jpg" alt="Login illustration">
    </div>
    <div class="right-panel">
      <form>
        <input type="text" placeholder="Enter Email/Mobile number" required>
        <p>
          By continuing, you agree to Flipkart's 
          <a href="#">Terms of Use</a> and 
          <a href="#">Privacy Policy</a>.
        </p>
        <button type="submit">Request OTP</button>
      </form>
      <p class="footer-text">
        New to Flipkart? <a href="#">Create an account</a>
      </p>
    </div>
  </div>
</body>
</html>
