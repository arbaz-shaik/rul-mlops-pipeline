<!DOCTYPE html>
<html >
<head>
  <title>Form Input Controls Example</title>
</head>
<body>
  <h1>Form Input Controls Example</h1>
  <form>
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter your name"><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Enter your password"><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email"><br><br>

    <label for="age">Age:</label>
    <input type="number" id="age" value="18"><br><br>

    <label for="rating">Rating:</label>
    <input type="range" id="rating" min="0" max="10" step="1"><br><br>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" value="2000-01-01"><br><br>

    <label for="time">Time:</label>
    <input type="time" id="time" value="12:00"><br><br>

    <label for="image">Image:</label>
    <input type="file" id="image" accept="image/*"><br><br>

    <label for="week">Week:</label>
    <input type="week" id="week"><br><br>

    <label for="month">Month:</label>
    <input type="month" id="month"><br><br>

    <label for="datetime">Datetime-Local:</label>
    <input type="datetime-local" id="datetime"><br><br>

    <label for="url">URL:</label>
    <input type="url" id="url"><br><br>

    <label for="search">Search:</label>
    <input type="search" id="search"><br><br>

    <label>Gender:</label>
    <input type="radio" id="male" name="gender" value="male" checked>
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label><br><br>

    <label>Interests:</label>
    <input type="checkbox" id="reading" name="interests" value="reading">
    <label for="reading">Reading</label>
    <input type="checkbox" id="sports" name="interests" value="sports" checked>
    <label for="sports">Sports</label><br><br>

    <label for="country">Country:</label>
    <select id="country" name="country">
      <option value="us">United States</option>
      <option value="in">India</option>
      <option value="uk">United Kingdom</option>
    </select><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" rows="4" cols="50" placeholder="Enter your message"></textarea><br><br>

    <button type="submit">Submit</button>
  </form>
</body>
</html>
