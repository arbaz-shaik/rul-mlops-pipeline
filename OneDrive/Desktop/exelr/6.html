<!DOCTYPE html>
<html>
<head>
    
    <title>JavaScript Loops, Operators & Conditions</title>
</head>
<body>


<script>
   
    let num1 = 10;
    let num2 = 5;

    if (num1 > num2) {
        console.log("Num1 is greater");
    } else {
        console.log("Num2 is greater");
    }


    let i = 1;
    while (i <= 5) {
        console.log("While loop iteration " + i);
        i++;
    }

   
    for (let j = 1; j <= 5; j++) {
        console.log("For loop iteration " + j);
    }

  
    let k = 1;
    do {
        console.log("Do-While loop iteration " + k);
        k++;
    } while (k <= 5);

    let day = 1;
    switch (day) {
        case 1:
            console.log("It's Monday");
            break;
        case 2:
            console.log("It's Tuesday");
            break;
        default:
            console.log("It's another day");
    }

</script>

</body>
</html>
