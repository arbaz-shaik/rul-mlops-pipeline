<!DOCTYPE html>

<html>
    <head>
        <title>
            call, apply and bin
        </title>
    </head>
    
    <body>
       <script>
        let obj = {
            num1: 100,
            num2: 200
        }

        let obj2= function(p1, p2,p3) {

            let res= this.num1+this.num2+p1+p2+p3
            document.write(res);
        };

  //      let arr1 =[10,20,40]

     //   obj2.apply(obj,arr1)

     let  func1= obj2.bind(obj);
     func1(10,300,48)
    
            
        
       </script>
    </body>
</html>
