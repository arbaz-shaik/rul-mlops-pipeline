<!DOCTYPE html>
<html>
    <head>
        <title>flexapp2</title>
    </head>

    <style>
        body{
            margin: 0px;
            padding: 0px;

        }

        .parent{
            display:flex;
            height: 80vh;
            align-items: center;
            border: 1px solid red;
            gap: 10px;
            justify-content: center;
            padding: 10px;
            margin: 30%;
        }

        img
        {
            width: 100px;
            border: 1px solid black;
            border-radius: 20px;
        
        }
        .fitem2{
            border: 1px solid  black;
            justify-content: center;
            width: 150px;
        }


    </style>
    <body>
        
        <div class="parent">
            <div class="fitem1">
                <img src="restaurant1.jpg" alt="error">
            </div>
            <div class="fitem2">
              <ul>
                <li>excelr</li>
                <li>java</li>
                <li>cybertower</li>
                <li>hitech city</li>
                <li>hyderbad</li>
 



              </ul>
            </div>

        </div>
    </body>
</html>
