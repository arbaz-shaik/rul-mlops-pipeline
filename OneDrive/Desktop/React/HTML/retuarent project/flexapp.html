<!DOCTYPE html>
<html>
    <head>
        <title>flexapp</title>
        <style>
            body{
                padding: 0px;
                margin: 0px;
                box-sizing: border-box;
            }
            img{
                width: 250px;
                height: 300px;
                border: 2px solid grey;
                padding: 20px;
                border-radius: 30px;

            }
            .parent{
                display: flex;
                gap: 10px;
                flex-wrap: wrap-reverse;
                justify-content: center;
                height: 100vh;
                align-items: center;
            }
        </style>
    </head>
    <body>
        
        <div class="parent">

            <img src="logo.png" alt="error">
            <img src="restaurant1.jpg" alt="error">
            <img src="restaurant2.jpg" alt="error">
            <img src="restaurant3.jpg" alt="error">
            <img src="restaurant4.jpg" alt="error">
            <img src="restaurant2.jpg" alt="error">
            <img src="restaurant3.jpg" alt="error">
            <img src="restaurant4.jpg" alt="error">
            <img src="restaurant5.jpg" alt="error">

        </div>

    </body>
</html>
