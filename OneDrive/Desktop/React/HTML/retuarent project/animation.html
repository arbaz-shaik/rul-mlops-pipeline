<!DOCTYPE html>
<html>
    <head>
        <title>
            animation
        </title>
        <style>
            body{
                background-color: black;
            }
            @keyframes Excelr {


                0%{left:0px; top:0px; border-radius: 0px; }
                25%{left:200px; top:0px; background-color: blueviolet; rotate: 30deg; border-radius: 100px; }
                50%{left:200px; top:200px;rotate: 60deg; }
                75%{left:0px; top:200px; rotate: 90deg; background-color: blue;  }


                
                
            }

            div{

                width: 100px;
                height: 100px;
                background-color: blue;
                animation-duration: 10s;
                animation-name: Excelr;
                position: relative;
              /*  animation-delay: ;*/
                animation-iteration-count: infinite;
                animation-direction: alternate-reverse;
                animation-timing-function: ease;


            }
            p{
                width: 100px;
                height: 100px;
                background-color: blue;
                animation-duration: 10s;
                animation-name: Excelr;
                position: relative;
              /*  animation-delay: ;*/
                animation-iteration-count: infinite;
                animation-direction: alternate-reverse;
                animation-timing-function: ease;


                


            }

            
        </style>
    </head>
    <body>
        <div>
          <p>hqha</p>
            
           <h1></h1>
        </div>
    </body>
</html>
