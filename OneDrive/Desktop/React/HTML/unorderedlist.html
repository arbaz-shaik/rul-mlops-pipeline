<!DOCTYPE html>
<html>
    <head>
        <title>unordered list</title>
        <link rel="stylesheet" href="ordered.css">
    </head>
    <body>
        <ul type="square">
            <li>helli</li>
            <li>hi</li>
            <li>snap</li>
            <li>insta</li>
            <li>fb</li>
        </ul>

        <ul>
            <li>helli</li>
            <li>hi</li>
            <li>snap</li>
            <li>insta</li>
            <li>fb</li>
        </ul>

        <ul type="circle">
            <li>helli</li>
            <li>hi</li>
            <li>snap</li>
            <li>insta</li>
            <li>fb</li>
        </ul>

        <ul type="disk">
            <li>helli</li>
            <li>hi</li>
            <li>snap</li>
            <li>insta</li>
            <li>fb</li>
        </ul>
    </body>
</html>
