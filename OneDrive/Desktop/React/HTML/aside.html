<!DOCTYPE html>
<html>
    <head>
        <title>Aside</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }
            aside {
                background-color: blanchedalmond;
                height: 100vh;
                width: 10%;
                float: right;
            }
            a {
                display: block;
                text-align: center;
                padding: 2px;
                margin: 10px;
                text-decoration: solid;
                color: brown;
                background: linear-gradient(90deg, white, wheat);
                border-radius: 30pc;
            
            }
            a:hover{
                color: azure;
                background: brown;
            }
        </style>
    </head>
    <body>
        <aside>
            <a href="#" target="_blank">home</a>

</html>
