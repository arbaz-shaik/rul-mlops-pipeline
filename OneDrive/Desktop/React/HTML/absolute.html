<!DOCTYPE html>
<html>
    <head>
        <title>Absolute Position</title>
        <style>
            fieldset{
                width: 50%;
                height: 300px;
                position: relative;
                left: 100px;
                top:200px;
            }
            button{
                position: absolute;
                left: 200px;
                top: 200px;
            }
        </style>

    </head>
    <body>
        <fieldset>
            <legend>
                LOGIN FORM
            </legend>
            <button> login</button>
        </fieldset>

    </body>
</html>
