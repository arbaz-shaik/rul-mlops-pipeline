<!DOCTYPE html>
<html>
    <style>
        fieldset{
            background-color: linear-gradient(45deg, brown, blue);
            width: 50%;
            background: 1px red;
            border-color:  yellow;
            border-radius: 30px;

        }
        legend{
            background-color: antiquewhite;
            color:gray;
            padding: 5px;
            border-radius: 20px;
        }
    </style>
    <head>
        <title>fieldset example</title>
    </head>
    <body>
        <fieldset>
            <legend>
                LOGIN FORM
            </legend>
            <H1>HEY THERE</H1>
        </fieldset>
    </body>
    
</html>
