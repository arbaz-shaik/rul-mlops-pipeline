    method:"GET",
    url: "https://www.w3schools.com/angular/customers.php",
    success: (posRes)=>{

        let obj = JSON.parse(posRes);
    let {records}=(obj);

        document.write(`<div class="parent">`);
            records.forEach((element,index) =>{
                let Name, city, County = element;
            document.write(`<div class="child"`);
            document.write(`<h1>${Name}</h1>`);                 
            document.write(`<h1>${City}</h2>`)     
            document.write(`<h1>${County}</h2>`)  }   

        )
