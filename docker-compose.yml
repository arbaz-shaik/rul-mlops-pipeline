version: '3.8'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_REGISTRY_NAME=rul-lstm
      - LOG_LEVEL=INFO
    depends_on:
      - mlflow
      - prometheus
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - '5000:5000'
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - ./mlflow-data:/mlflow

  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana

  drift-detector:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DRIFT_PSI_THRESHOLD=0.2
    depends_on:
      - api
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  retrainer:
    build:
      context: .
      dockerfile: Dockerfile.retrain
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_REGISTRY_NAME=rul-lstm
      - BOOTSTRAP_RESAMPLES=1000
    depends_on:
      - mlflow
      - drift-detector
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  shadow-validator:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_REGISTRY_NAME=rul-lstm
      - SHADOW_CI_THRESHOLD=0.95
      - BOOTSTRAP_RESAMPLES=1000
    depends_on:
      - mlflow
      - api
    volumes:
      - ./src:/app/src
      - ./data:/app/data

volumes:
  grafana-data:
  mlflow-data:
